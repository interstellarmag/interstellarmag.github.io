<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <nav class="px-24 bg-black text-white h-16 md:flex justify-between items-center transition-grad-t">
        <a href="index.html" class="h-16"><img src="./images/logo.png" alt="Logo" class="h-16"/></a>
        <div class="md:flex gap-10">
            <a href="about.html">About</a>
            <a href="https://forms.gle/zTKxUdB8UKjHLcjq7" class="pretty-text">Submit your article!</a>
            <a href="https://substack.com/@interstellarmag">Published Articles</a>
            <a href="staff.html">Our Staff</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </nav>

    <header class="relative bg-black text-white transition-grad-b">
        <div class="logo-grad h-72 md:h-[376px] w-full md:flex justify-center items-center">
            <h1 class="text-8xl brand-font">Contact Us</h1>
        </div>
    </header>

    <main class="text-white">
        <div class="md:flex gap-10 p-24 transition-grad-even">
            <div class="w-1/2 py-4">
                <h2 class="brand-font text-2xl mb-4 pretty-text">Contact Form</h2>
                <!--theres prolly a way to do this but mex just used an iframe with the google form aaaand 
                i think that wouldnt fit our Vibe; so! im volunteering my Actual Website with an 
                Actual Backend for this !! XD-->
                <form class="md:flex md:flex-col gap-2" method="POST" action="https://www.margins.pro/interstellarmailservice.php"> 
                    <label for="name">Your Name</label>
                    <input required id="name" name="name" type="text" placeholder="Name" class="pretty-border mb-4"/>
                    <label for="email">Your Email</label>
                    <input required id="email" name="email" type="email" placeholder="email@gmail.com" class="pretty-border mb-4"/>
                    <label for="text">Message Text</label>
                    <textarea required id="text" name="text" type="text" placeholder="I am writing because..." class="pretty-border mb-6"></textarea>
                    <input class="w-32 pretty-border pretty-button text-lg" type="submit" value="Submit!"/>
                </form>
            </div>
            <div class="w-1/2 py-4">
                <h2 class="brand-font text-xl mb-4 pretty-text">Our Social Media:</h2>
                <div class="md:flex md:flex-col gap-2 text-xl underline">
                    <a href="https://linktr.ee/interstellarmag" class="p-2 block">
                        <img src="./images/linktree.png" width="30px" class="inline me-4"/>Linktree
                    </a>
                    <a href="https://substack.com/@interstellarmag" class="p-2 block">
                        <img src="./images/substack.png" width="28px" class="inline me-4"/>Substack
                    </a>
                    <a href="https://www.instagram.com/interstellar.stem" class="p-2 block">
                        <img src="./images/instagram.png" width="30px" class="inline me-4"/>Instagram
                    </a>
                    <a href="mailto:interstellarmagazine@gmail.com" class="p-2 block">
                        <img src="./images/email.png" width="35px" class="inline me-4"/>Email
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="px-24 h-16 md:flex justify-between items-center transition-grad-b text-white">
        <span>Copyright (c) 2026 All Rights Reserved</span>
        <div class="md:flex items-center">
            <a href="https://linktr.ee/interstellarmag" class="p-4">
                <img src="./images/linktree.png" width="20px"/>
            </a>
            <a href="https://substack.com/@interstellarmag" class="p-4">
                <img src="./images/substack.png" width="20px"/>
            </a>
            <a href="https://www.instagram.com/interstellar.stem" class="p-4">
                <img src="./images/instagram.png" width="20px"/>
            </a>
            <a href="mailto:interstellarmagazine@gmail.com" class="p-4">
                <img src="./images/email.png" width="23px"/>
            </a>
        </div>
    </footer>
</body>
</html>
